kind = "web"
previewPath = "/"
title = "AI Email Autoresponder"
version = "1.0.0"
id = "artifacts/email-autoresponder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26093

[services.development]
run = "pnpm --filter @workspace/email-autoresponder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/email-autoresponder", "run", "build" ]
publicDir = "artifacts/email-autoresponder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26093"
BASE_PATH = "/"
